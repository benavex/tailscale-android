name: awg-aar

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/awg-aar.yml'
      - 'go.mod'
      - 'go.sum'
      - 'libtailscale/**'
      - 'android/**'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      versionCode: ${{ steps.vcode.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: tailscale-android
          # fetch-depth: 0 — need full history for `git rev-list --count HEAD`
          # below (otherwise versionCode is stuck at BASE+1 forever).
          fetch-depth: 0

      - name: Clone sibling forks for go.mod replace directives
        run: |
          git clone --depth=1 https://github.com/benavex/amneziawg-go.git amneziawg-go
          git clone --depth=1 https://github.com/benavex/tailscale.git tailscale

      - uses: actions/setup-go@v5
        with:
          go-version-file: tailscale-android/go.mod
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK + NDK
        working-directory: tailscale-android
        run: |
          set -x
          # Use the runner's pre-provisioned ANDROID_SDK_ROOT, which already has
          # cmdline-tools/latest, so the Makefile's androidsdk target only needs
          # to add the platforms / build-tools / NDK we depend on.
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls "${ANDROID_SDK_ROOT}" || true
          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" \
            'platforms;android-34' 'extras;android;m2repository' \
            'ndk;23.1.7779620' 'platform-tools' 'build-tools;34.0.0'

      - name: go mod tidy
        working-directory: tailscale-android
        run: go mod tidy

      - name: Build libtailscale AAR
        working-directory: tailscale-android
        run: |
          set -x
          make libtailscale

      - name: Compute versionCode from git history
        id: vcode
        working-directory: tailscale-android
        run: |
          # Offset past the upstream baseline (468) so our rolling builds
          # always outrank anything older installed from upstream releases.
          BASE=10000
          COUNT=$(git rev-list --count HEAD)
          echo "code=$((BASE + COUNT))" >> "$GITHUB_OUTPUT"

      - name: Build debug APK (arm64-v8a included)
        working-directory: tailscale-android
        env:
          VERSION_CODE: ${{ steps.vcode.outputs.code }}
        run: |
          set -x
          echo "building with versionCode=$VERSION_CODE"
          make tailscale-debug

      - name: Stage release artifacts
        working-directory: tailscale-android
        run: |
          set -x
          mkdir -p dist
          cp android/libs/libtailscale.aar            dist/libtailscale.aar
          cp android/libs/libtailscale_unstripped.aar dist/libtailscale_unstripped.aar
          cp tailscale-debug.apk                       dist/tailscale-debug.apk
          (cd dist && sha256sum * > SHA256SUMS.txt)
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: tailscale-android-awg
          path: tailscale-android/dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -la artifacts/

      - name: Rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: awg-latest
          VERSION_CODE: ${{ needs.build.outputs.versionCode }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Build the release notes with printf so we keep the embedded
          # newlines without confusing YAML's literal-block parser (a
          # blank line at column 0 inside `run: |` terminates the scalar).
          NOTES=$(printf 'versionCode=%s\n\nDebug APK + libtailscale AAR built with the benavex amneziawg-go engine and benavex tailscale fork. Commit %s. APK is universal (contains arm64-v8a, armeabi-v7a, x86_64).\n' "$VERSION_CODE" "$COMMIT_SHA")
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "AWG Android v$VERSION_CODE (rolling)" \
            --notes "$NOTES" \
            artifacts/*
